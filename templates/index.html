<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知乎数据监控中心</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #0084ff;
            --bg-color: #f6f6f6;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --text-main: #121212;
            --text-muted: #8590a6;
            --border-color: #ebebeb;
            --hover-bg: #f3f3f3;
            --success-color: #17a2b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ---------------- 左侧导航 ---------------- */
        .sidebar {
            width: 200px;
            flex-shrink: 0;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            box-shadow: 0 1px 3px rgba(18, 18, 18, .1);
            z-index: 10;
            overflow-y: auto;
        }

        .logo {
            padding: 24px;
            font-size: 20px;
            font-weight: 600;
            color: var(--primary-color);
            border-bottom: 1px solid var(--border-color);
        }

        .nav-menu {
            list-style: none;
            padding: 12px 0;
            margin: 0;
        }

        .nav-item {
            padding: 16px 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            font-size: 16px;
            transition: all 0.2s;
        }

        .nav-item:hover {
            background-color: var(--hover-bg);
        }

        .nav-item.active {
            color: var(--primary-color);
            background-color: rgba(0, 132, 255, .08);
            border-right: 3px solid var(--primary-color);
            font-weight: 500;
        }

        .nav-icon {
            margin-right: 12px;
            font-size: 18px;
        }

        /* ---------------- 右侧内容区 ---------------- */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 40px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 600;
            margin: 0;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ---------------- 数据看板：时间筛选 ---------------- */
        .time-filters {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
        }

        .time-filter-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 15px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .time-filter-btn:hover {
            color: var(--text-main);
        }

        .time-filter-btn.active {
            color: var(--primary-color);
            font-weight: 500;
        }

        /* ---------------- 数据看板：总览卡片 ---------------- */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 1px 3px rgba(18, 18, 18, .1);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }

        .card-value {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .card-trend {
            font-size: 13px;
            color: var(--text-muted);
        }

        .trend-up {
            color: var(--success-color);
            font-weight: 500;
        }

        /* ---------------- 数据看板：折线图 ---------------- */
        .chart-container {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 1px 3px rgba(18, 18, 18, .1);
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
            height: 400px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .chart-actions button {
            background: none;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-muted);
            margin-left: 8px;
        }

        .chart-actions button.active {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        /* ---------------- 表格样式 (用于文章管理) ---------------- */
        .table-container {
            background: var(--card-bg);
            border-radius: 8px;
            box-shadow: 0 1px 3px rgba(18, 18, 18, .1);
            border: 1px solid var(--border-color);
            overflow: hidden;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th,
        td {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #fafafa;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            user-select: none;
        }

        th:hover {
            background-color: #f0f0f0;
        }

        th.sort-asc::after {
            content: ' ↑';
            color: var(--primary-color);
        }

        th.sort-desc::after {
            content: ' ↓';
            color: var(--primary-color);
        }

        td {
            font-size: 15px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .article-title-cell {
            color: var(--primary-color);
            font-weight: 500;
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ---------------- 表单与按钮 ---------------- */
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn:hover {
            background-color: #0077e6;
        }

        .btn-danger {
            background-color: transparent;
            color: #f1403c;
            border: 1px solid #f1403c;
        }

        .btn-danger:hover {
            background-color: #f1403c;
            color: white;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
            background-color: #fff;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .add-article-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 1px 3px rgba(18, 18, 18, .1);
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
        }

        /* ---------------- 二级侧边栏（独立一列） ---------------- */
        .secondary-sidebar {
            width: 220px;
            flex-shrink: 0;
            background-color: #fafafa;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .secondary-sidebar.hidden {
            display: none;
        }

        .secondary-sidebar-header {
            padding: 20px 20px 8px;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .secondary-sidebar-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .secondary-sidebar-item {
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-main);
            transition: all 0.15s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border-left: 3px solid transparent;
        }

        .secondary-sidebar-item:hover {
            background-color: var(--hover-bg);
        }

        .secondary-sidebar-item.active {
            color: var(--primary-color);
            font-weight: 500;
            background-color: rgba(0, 132, 255, .06);
            border-left-color: var(--primary-color);
        }

        .secondary-sidebar-search {
            padding: 8px 12px;
            margin: 0;
        }

        .secondary-sidebar-search input {
            width: 100%;
            padding: 7px 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 13px;
            box-sizing: border-box;
            background: #fff;
            outline: none;
        }

        .secondary-sidebar-search input:focus {
            border-color: var(--primary-color);
        }
    </style>
</head>

<body>

    <!-- 一级导航 -->
    <div class="sidebar">
        <div class="logo">知乎数据中心</div>
        <ul class="nav-menu">
            <li class="nav-item active" onclick="switchTab('dashboard')">
                <span class="nav-icon">📊</span> 流量与交互
            </li>
            <li class="nav-item" onclick="switchTab('articles')">
                <span class="nav-icon">�</span> 文章与排版
            </li>
            <li class="nav-item" onclick="switchTab('settings')">
                <span class="nav-icon">⚙️</span> 系统配置
            </li>
        </ul>
    </div>

    <!-- 二级侧边栏：文章列表 -->
    <div class="secondary-sidebar" id="secondarySidebar">
        <div class="secondary-sidebar-header">文章列表</div>
        <div class="secondary-sidebar-search">
            <input type="text" id="articleSearchInput" placeholder="搜索文章..."
                onkeydown="if(event.key==='Enter') filterArticleList()">
        </div>
        <ul class="secondary-sidebar-list" id="articleSubMenu">
            <li class="secondary-sidebar-item active" onclick="switchArticle('', this)">📈 总览</li>
            <!-- JS 动态渲染 -->
        </ul>
    </div>

    <!-- 右侧内容 -->
    <div class="main-content">

        <!-- ================= 数据看板 ================= -->
        <div id="tab-dashboard" class="tab-content active">
            <div class="page-header">
                <h1 class="page-title">整体数据总览</h1>
                <button class="btn" onclick="loadDashboard()">刷新数据</button>
            </div>

            <!-- 时间筛选 -->
            <div class="time-filters">
                <button class="time-filter-btn" data-days="0" data-label="今天" onclick="filterTime(this, 1)">今天</button>
                <button class="time-filter-btn active" data-days="7" data-label="最近7天" onclick="filterTime(this, 7)">最近
                    7 天</button>
                <button class="time-filter-btn" data-days="14" data-label="最近14天" onclick="filterTime(this, 14)">最近 14
                    天</button>
                <button class="time-filter-btn" data-days="30" data-label="最近30天" onclick="filterTime(this, 30)">最近 30
                    天</button>
            </div>


            <!-- 总览卡片 -->
            <div class="summary-cards">
                <div class="card">
                    <div class="card-title">阅读总量 ⏱</div>
                    <div class="card-value" id="card-pv">--</div>
                    <div class="card-trend">今日 <span class="trend-up">↑ <span id="trend-pv">--</span></span></div>
                </div>
                <div class="card">
                    <div class="card-title">赞同总量 👍</div>
                    <div class="card-value" id="card-upvote">--</div>
                    <div class="card-trend">今日 <span class="trend-up">↑ <span id="trend-upvote">--</span></span></div>
                </div>
                <div class="card">
                    <div class="card-title">评论总量 💬</div>
                    <div class="card-value" id="card-comment">--</div>
                    <div class="card-trend">今日 <span class="trend-up">↑ <span id="trend-comment">--</span></span></div>
                </div>
                <div class="card">
                    <div class="card-title">收藏总量 ⭐</div>
                    <div class="card-value" id="card-collect">--</div>
                    <div class="card-trend">今日 <span class="trend-up">↑ <span id="trend-collect">--</span></span></div>
                </div>
                <div class="card">
                    <div class="card-title">分享总量 🔗</div>
                    <div class="card-value" id="card-share">--</div>
                    <div class="card-trend">今日 <span class="trend-up">↑ <span id="trend-share">--</span></span></div>
                </div>
                <div class="card" style="border-left: 3px solid var(--success-color);">
                    <div class="card-title">平均完读率 📖</div>
                    <div class="card-value" id="card-finish">--</div>
                    <div class="card-trend">点击率: <span id="card-clickrate"
                            style="color:var(--text-main);font-weight:500;">--</span></div>
                </div>
            </div>

            <!-- 折线图 -->
            <div class="chart-container">
                <div class="chart-header">
                    <h3 style="margin:0; font-size: 16px; font-weight: 500;">趋势分析 (<span
                            id="chart-title-days">最近7天</span>)</h3>
                    <div class="chart-actions">
                        <button class="active" onclick="switchChartMetric('pv', this)">阅读</button>
                        <button onclick="switchChartMetric('upvote', this)">点赞</button>
                        <button onclick="switchChartMetric('collect', this)">收藏</button>
                    </div>
                </div>
                <canvas id="trendChart"></canvas>
            </div>
        </div>

        <!-- ================= 文章管理 (包含表格) ================= -->
        <div id="tab-articles" class="tab-content">
            <div class="page-header">
                <h1 class="page-title">文章与数据明细</h1>
            </div>

            <!-- 添加文章 -->
            <div class="add-article-card">
                <h3 style="margin-top:0; margin-bottom: 16px;">添加新文章监控</h3>
                <div style="display: flex; gap: 16px;">
                    <div style="flex: 2;">
                        <input type="text" id="add-url" class="form-control"
                            placeholder="粘贴知乎回答链接，例如：https://www.zhihu.com/question/.../answer/...">
                    </div>
                    <div style="flex: 1;">
                        <input type="text" id="add-title" class="form-control" placeholder="标题（可选，留空自动获取）">
                    </div>
                    <button class="btn" onclick="addArticle()">+ 添加监控</button>
                </div>
            </div>

            <!-- 排序表格 -->
            <div class="table-container">
                <table id="articleTable">
                    <thead>
                        <tr>
                            <th>文章信息</th>
                            <th onclick="sortTable('today_pv')" data-sort="today_pv">阅读量</th>
                            <th onclick="sortTable('click_rate')" data-sort="click_rate">点击率</th>
                            <th onclick="sortTable('finish_read_percent')" data-sort="finish_read_percent">完读率</th>
                            <th onclick="sortTable('today_upvote')" data-sort="today_upvote">点赞量</th>
                            <th onclick="sortTable('today_collect')" data-sort="today_collect">收藏量</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="articleTableBody">
                        <!-- JS 渲染 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- ================= 系统配置 ================= -->
        <div id="tab-settings" class="tab-content">
            <div class="page-header">
                <h1 class="page-title">核心抓取配置</h1>
                <button class="btn" onclick="saveConfig()">保存配置</button>
            </div>

            <div class="card" style="max-width: 800px;">
                <div class="form-group">
                    <label class="form-label">抓取时间间隔 (分钟)</label>
                    <input type="number" id="conf-interval" class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label">多文章并发请求延迟 (秒) - 防反爬</label>
                    <input type="number" id="conf-delay" class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label">知乎 Cookie (过期需手动替换)</label>
                    <textarea id="conf-cookie" class="form-control" rows="5"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">x-zse-96 签名鉴权</label>
                    <input type="text" id="conf-zse96" class="form-control">
                </div>
            </div>
        </div>

    </div>

    <script>
        // ---------------- 基础导航逻辑 ----------------
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));

            document.getElementById(`tab-${tabId}`).classList.add('active');
            event.currentTarget.classList.add('active');

            // 控制二级侧边栏显隐：仅在"dashboard"时显示
            const secondarySidebar = document.getElementById('secondarySidebar');
            if (tabId === 'dashboard') {
                secondarySidebar.classList.remove('hidden');
            } else {
                secondarySidebar.classList.add('hidden');
            }

            if (tabId === 'dashboard') loadDashboard();
            if (tabId === 'articles') loadArticlesTable();
            if (tabId === 'settings') loadConfig();
        }

        // ---------------- 全局变量 ----------------
        let currentDays = 7;
        let currentMetric = 'pv';
        let currentArticleToken = '';  // 空字符串 = 总览
        let chartInstance = null;
        let tableData = [];
        let currentSortCol = '';
        let sortAsc = false;
        let allArticles = [];  // 缓存文章列表用于搜索过滤

        // ---------------- 初始化 ----------------
        window.onload = () => {
            loadArticleSubNav();
            loadDashboard();
        };

        // ---------------- 格式化辅助 ----------------
        function parsePercent(str) {
            if (!str) return 0;
            return parseFloat(str.replace('%', ''));
        }

        // ---------------- 二级文章导航（独立侧边栏） ----------------
        async function loadArticleSubNav() {
            try {
                const res = await fetch('/api/articles');
                allArticles = await res.json();
                renderArticleList(allArticles);
            } catch (e) {
                console.error('加载文章导航失败', e);
            }
        }

        function renderArticleList(articles) {
            const container = document.getElementById('articleSubMenu');
            // 保留第一个"总览"项
            const firstChild = container.firstElementChild;
            container.innerHTML = '';
            container.appendChild(firstChild);
            articles.forEach(article => {
                const item = document.createElement('li');
                item.className = 'secondary-sidebar-item';
                if (article.token === currentArticleToken) {
                    item.className += ' active';
                }
                item.title = article.title;
                item.innerText = article.title;
                item.onclick = function () { switchArticle(article.token, this); };
                container.appendChild(item);
            });
        }

        function filterArticleList() {
            const keyword = document.getElementById('articleSearchInput').value.trim().toLowerCase();
            if (!keyword) {
                renderArticleList(allArticles);
                return;
            }
            const filtered = allArticles.filter(a => a.title.toLowerCase().includes(keyword));
            renderArticleList(filtered);
        }

        function switchArticle(token, elem) {
            document.querySelectorAll('.secondary-sidebar-item').forEach(el => el.classList.remove('active'));
            elem.classList.add('active');
            currentArticleToken = token;
            // 更新标题
            const titleEl = document.querySelector('.page-title');
            if (token) {
                titleEl.innerText = elem.title || elem.innerText;
            } else {
                titleEl.innerText = '整体数据总览';
            }
            loadDashboard();
        }

        // ---------------- [模块1] 数据看板 ----------------
        function filterTime(btnElem, days) {
            document.querySelectorAll('.time-filter-btn').forEach(btn => btn.classList.remove('active'));
            btnElem.classList.add('active');
            currentDays = days;
            document.getElementById('chart-title-days').innerText = btnElem.getAttribute('data-label');
            loadDashboard();
        }

        function switchChartMetric(metric, btnElem) {
            document.querySelectorAll('.chart-actions button').forEach(b => b.classList.remove('active'));
            btnElem.classList.add('active');
            currentMetric = metric;
            renderChart();
        }

        async function loadDashboard() {
            try {
                const dateStr = new Date().toISOString().split('T')[0];
                const tokenParam = currentArticleToken ? `&token=${currentArticleToken}` : '';

                // 获取总览/单篇文章的汇总数据
                const sumRes = await fetch(`/api/stats/summary?date=${dateStr}${tokenParam}`);
                const sumData = await sumRes.json();

                document.getElementById('card-pv').innerText = (sumData.total_pv || 0).toLocaleString();
                document.getElementById('card-upvote').innerText = (sumData.total_upvote || 0).toLocaleString();
                document.getElementById('card-comment').innerText = (sumData.total_comment || 0).toLocaleString();
                document.getElementById('card-collect').innerText = (sumData.total_collect || 0).toLocaleString();
                document.getElementById('card-share').innerText = (sumData.total_share || 0).toLocaleString();

                document.getElementById('card-finish').innerText = sumData.avg_finish_rate;
                document.getElementById('card-clickrate').innerText = sumData.click_rate;

                // 获取趋势数据（带 token 筛选）
                const trendTokenParam = currentArticleToken ? `&token=${currentArticleToken}` : '';
                const trendRes = await fetch(`/api/stats/trend?days=${currentDays}${trendTokenParam}`);
                window.trendDataRaw = await trendRes.json();

                // 计算增量（取最近两条的差值）
                if (window.trendDataRaw && window.trendDataRaw.length >= 2) {
                    const latest = window.trendDataRaw[window.trendDataRaw.length - 1];
                    const prev = window.trendDataRaw[window.trendDataRaw.length - 2];
                    document.getElementById('trend-pv').innerText = Math.max(0, latest.today_pv - prev.today_pv).toLocaleString();
                    document.getElementById('trend-upvote').innerText = Math.max(0, latest.today_upvote - prev.today_upvote).toLocaleString();
                    document.getElementById('trend-comment').innerText = 0;
                    document.getElementById('trend-collect').innerText = Math.max(0, latest.today_collect - prev.today_collect).toLocaleString();
                    document.getElementById('trend-share').innerText = Math.max(0, latest.today_share - prev.today_share).toLocaleString();
                }

                renderChart();
            } catch (e) {
                console.error('加载面板失败', e);
            }
        }

        function renderChart() {
            if (!window.trendDataRaw) return;

            let labels = [];
            let dataPoints = [];

            if (currentDays === 1) {
                // 「今天」模式：展示日内每次抓取的时间序列，X 轴为 HH:mm
                const todayStr = new Date().toISOString().split('T')[0];
                const todayData = window.trendDataRaw.filter(item => {
                    // fetch_time 格式为 "YYYY-MM-DD HH:MM:SS"
                    return item.fetch_time && item.fetch_time.startsWith(todayStr);
                });

                labels = todayData.map(item => {
                    // 提取 HH:mm
                    const timePart = item.fetch_time.split(' ')[1] || '';
                    return timePart.substring(0, 5);
                });
                dataPoints = todayData.map(item => {
                    if (currentMetric === 'pv') return item.today_pv;
                    if (currentMetric === 'upvote') return item.today_upvote;
                    if (currentMetric === 'collect') return item.today_collect;
                    return 0;
                });
            } else {
                // 多天模式：按天去重，取每天最后一条
                const dailyMap = {};
                window.trendDataRaw.forEach(item => {
                    const date = item.today_date;
                    if (!date) return;
                    dailyMap[date] = item;
                });

                labels = Object.keys(dailyMap).sort();
                dataPoints = labels.map(date => {
                    const row = dailyMap[date];
                    if (currentMetric === 'pv') return row.today_pv;
                    if (currentMetric === 'upvote') return row.today_upvote;
                    if (currentMetric === 'collect') return row.today_collect;
                    return 0;
                });
            }

            const ctx = document.getElementById('trendChart').getContext('2d');

            if (chartInstance) {
                chartInstance.destroy();
            }

            const labelName = currentMetric === 'pv' ? '阅读量' : (currentMetric === 'upvote' ? '点赞数' : '收藏数');

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: labelName,
                        data: dataPoints,
                        borderColor: '#0084ff',
                        backgroundColor: 'rgba(0,132,255,0.1)',
                        borderWidth: 2,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#0084ff',
                        pointBorderWidth: 2,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#f0f0f0' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        // ---------------- [模块2] 文章与表格排序 ----------------
        async function loadArticlesTable() {
            try {
                const res = await fetch('/api/articles/table');
                tableData = await res.json();
                renderTable();
            } catch (e) {
                console.error(e);
            }
        }

        function renderTable() {
            const tbody = document.getElementById('articleTableBody');
            tbody.innerHTML = '';
            tableData.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                <td>
                    <div class="article-title-cell" title="${row.title}">${row.title}</div>
                    <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">ID: ${row.token}</div>
                </td>
                <td>${(row.today_pv || 0).toLocaleString()}</td>
                <td><span style="color:var(--primary-color)">${row.click_rate}</span></td>
                <td>${row.finish_read_percent || '0%'}</td>
                <td>${(row.today_upvote || 0).toLocaleString()}</td>
                <td>${(row.today_collect || 0).toLocaleString()}</td>
                <td>
                    <button class="btn btn-danger" onclick="deleteArticle('${row.token}')">删除</button>
                </td>
            `;
                tbody.appendChild(tr);
            });
        }

        function sortTable(col) {
            if (currentSortCol === col) {
                sortAsc = !sortAsc;
            } else {
                currentSortCol = col;
                sortAsc = false; // 默认降序
            }

            // 更新表头箭头样式
            document.querySelectorAll('th[data-sort]').forEach(th => {
                th.classList.remove('sort-asc', 'sort-desc');
                if (th.getAttribute('data-sort') === col) {
                    th.classList.add(sortAsc ? 'sort-asc' : 'sort-desc');
                }
            });

            tableData.sort((a, b) => {
                let valA = a[col] || 0;
                let valB = b[col] || 0;

                // 特殊处理带%的百分比
                if (col === 'click_rate' || col === 'finish_read_percent') {
                    valA = parsePercent(valA);
                    valB = parsePercent(valB);
                }

                if (valA < valB) return sortAsc ? -1 : 1;
                if (valA > valB) return sortAsc ? 1 : -1;
                return 0;
            });

            renderTable();
        }

        async function addArticle() {
            const url = document.getElementById('add-url').value.trim();
            const title = document.getElementById('add-title').value.trim();
            if (!url) {
                alert('请粘贴知乎回答链接');
                return;
            }
            try {
                const res = await fetch('/api/articles', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, title })
                });
                if (res.ok) {
                    document.getElementById('add-url').value = '';
                    document.getElementById('add-title').value = '';
                    loadArticlesTable();
                    loadArticleSubNav(); // 同步刷新侧边栏
                } else {
                    const data = await res.json();
                    alert(data.error || '添加失败');
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function deleteArticle(token) {
            if (!confirm('确定要删除此文章的监控吗？')) return;
            try {
                await fetch(`/api/articles/${token}`, { method: 'DELETE' });
                loadArticlesTable();
            } catch (e) {
                console.error(e);
            }
        }

        // ---------------- [模块3] 系统配置 ----------------
        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const conf = await res.json();
                document.getElementById('conf-interval').value = conf.interval_minutes || 10;
                document.getElementById('conf-delay').value = conf.request_delay_seconds || 5;
                document.getElementById('conf-cookie').value = conf.cookie || '';
                document.getElementById('conf-zse96').value = conf.x_zse_96 || '';
            } catch (e) {
                console.error(e);
            }
        }

        async function saveConfig() {
            const payload = {
                interval_minutes: document.getElementById('conf-interval').value,
                request_delay_seconds: document.getElementById('conf-delay').value,
                cookie: document.getElementById('conf-cookie').value,
                x_zse_96: document.getElementById('conf-zse96').value
            };
            try {
                const res = await fetch('/api/config', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (res.ok) alert('配置已保存成功！下次抓取时生效。');
            } catch (e) {
                console.error(e);
            }
        }

    </script>
</body>

</html>
