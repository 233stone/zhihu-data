<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知乎数据监控中心</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>

<body>

    <!-- 一级导航 -->
    <div class="sidebar">
        <div class="logo">
            <span class="logo-text">知乎数据中心</span>
            <button id="sidebarToggleBtn" class="sidebar-toggle" onclick="toggleSidebar()" title="折叠导航">«</button>
        </div>
        <ul class="nav-menu">
            <li class="nav-item active" data-tab="dashboard" title="流量与交互" onclick="switchTab('dashboard', this)">
                <span class="nav-icon">📊</span><span class="nav-text">流量与交互</span>
            </li>
            <li class="nav-item" data-tab="articles" title="文章与排版" onclick="switchTab('articles', this)">
                <span class="nav-icon">📝</span><span class="nav-text">文章与排版</span>
            </li>
            <li class="nav-item" data-tab="settings" title="系统配置" onclick="switchTab('settings', this)">
                <span class="nav-icon">⚙️</span><span class="nav-text">系统配置</span>
            </li>
        </ul>
    </div>

    <!-- 二级侧边栏：文章列表 -->
    <div class="secondary-sidebar" id="secondarySidebar">
        <div class="secondary-sidebar-header">文章列表</div>
        <div class="secondary-sidebar-search">
            <input type="text" id="articleSearchInput" placeholder="搜索文章..."
                onkeydown="if(event.key==='Enter') filterArticleList()">
        </div>
        <ul class="secondary-sidebar-list" id="articleSubMenu">
            <li class="secondary-sidebar-item active" data-token="" onclick="switchArticle('', this)">📈 总览</li>
            <!-- JS 动态渲染 -->
        </ul>
    </div>

    <!-- 右侧内容 -->
    <div class="main-content">

        <!-- ================= 数据看板 ================= -->
        <div id="tab-dashboard" class="tab-content active">
            <div class="page-header">
                <h1 class="page-title">整体数据总览</h1>
                <button class="btn" onclick="loadDashboard()">刷新数据</button>
            </div>

            <!-- 时间筛选 -->
            <div class="time-filters">
                <button class="time-filter-btn active" data-filter="today" data-days="1" data-label="今天"
                    onclick="filterTime(this, 'today', 1)">今天</button>
                <button class="time-filter-btn" data-filter="yesterday" data-days="2" data-label="昨天"
                    onclick="filterTime(this, 'yesterday', 2)">昨天</button>
                <button class="time-filter-btn" data-filter="days" data-days="7" data-label="最近7天" onclick="filterTime(this, 'days', 7)">最近
                    7 天</button>
                <button class="time-filter-btn" data-filter="days" data-days="14" data-label="最近14天" onclick="filterTime(this, 'days', 14)">最近 14
                    天</button>
                <button class="time-filter-btn" data-filter="days" data-days="30" data-label="最近30天" onclick="filterTime(this, 'days', 30)">最近 30
                    天</button>
            </div>


            <!-- 总览卡片 -->
            <div class="summary-cards">
                <div class="card">
                    <div class="card-title">阅读总量 ⏱</div>
                    <div class="card-value" id="card-pv">--</div>
                </div>
                <div class="card">
                    <div class="card-title">点击率 ⚡</div>
                    <div class="card-value" id="card-clickrate">--</div>
                </div>
                <div class="card">
                    <div class="card-title">平均完读率 📖</div>
                    <div class="card-value" id="card-finish">--</div>
                </div>
                <div class="card">
                    <div class="card-title">赞同总量 👍</div>
                    <div class="card-value" id="card-upvote">--</div>
                </div>
                <div class="card">
                    <div class="card-title">收藏总量 ⭐</div>
                    <div class="card-value" id="card-collect">--</div>
                </div>
                <div class="card">
                    <div class="card-title">评论总量 💬</div>
                    <div class="card-value" id="card-comment">--</div>
                </div>
                <div class="card">
                    <div class="card-title">分享总量 🔗</div>
                    <div class="card-value" id="card-share">--</div>
                </div>
            </div>

            <!-- 折线图 -->
            <div class="chart-container">
                <div class="chart-header">
                    <h3 style="margin:0; font-size: 16px; font-weight: 500;">趋势分析 (<span
                            id="chart-title-days">今天</span>)</h3>
                    <div class="chart-actions">
                        <button class="active" onclick="switchChartMetric('pv', this)">阅读</button>
                        <button onclick="switchChartMetric('upvote', this)">点赞</button>
                        <button onclick="switchChartMetric('collect', this)">收藏</button>
                    </div>
                </div>
                <canvas id="trendChart"></canvas>
            </div>
        </div>

        <!-- ================= 文章管理 (包含表格) ================= -->
        <div id="tab-articles" class="tab-content">
            <div class="page-header">
                <h1 class="page-title">文章与数据明细</h1>
            </div>

            <!-- 添加文章 -->
            <div class="add-article-card">
                <h3 style="margin-top:0; margin-bottom: 16px;">添加新文章监控</h3>
                <div style="display: flex; gap: 16px;">
                    <div style="flex: 2;">
                        <input type="text" id="add-url" class="form-control" placeholder="粘贴回答链接或分享文本（支持标题+链接）">
                    </div>
                    <div style="flex: 1;">
                        <input type="text" id="add-title" class="form-control" placeholder="标题（可选，留空自动获取）">
                    </div>
                    <button class="btn" onclick="addArticle()">+ 添加监控</button>
                </div>
            </div>

            <!-- 排序表格 -->
            <div class="table-container">
                <table id="articleTable">
                    <thead>
                        <tr>
                            <th>文章信息</th>
                            <th onclick="sortTable('total_show')" data-sort="total_show">总展现量</th>
                            <th onclick="sortTable('total_pv')" data-sort="total_pv">总阅读量</th>
                            <th onclick="sortTable('click_rate')" data-sort="click_rate">总点击率</th>
                            <th onclick="sortTable('finish_read_percent')" data-sort="finish_read_percent">总完读率</th>
                            <th onclick="sortTable('positive_interact_percent')" data-sort="positive_interact_percent">总正向互动率</th>
                            <th onclick="sortTable('exposure_interact_rate')" data-sort="exposure_interact_rate">总曝光互动率</th>
                            <th onclick="sortTable('total_upvote')" data-sort="total_upvote">总点赞量</th>
                            <th onclick="sortTable('total_collect')" data-sort="total_collect">总收藏量</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="articleTableBody">
                        <!-- JS 渲染 -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- ================= 系统配置 ================= -->
        <div id="tab-settings" class="tab-content">
            <div class="page-header">
                <h1 class="page-title">核心抓取配置</h1>
                <button class="btn" onclick="saveConfig()">保存配置</button>
            </div>
            <div id="config-validate-result" style="margin-bottom: 12px; font-size: 13px; color: var(--text-muted);">
            </div>

            <div class="card" style="max-width: 800px;">
                <div class="form-group">
                    <label class="form-label">抓取时间间隔 (分钟)</label>
                    <input type="number" id="conf-interval" class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label">多文章并发请求延迟 (秒) - 防反爬</label>
                    <input type="number" id="conf-delay" class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label">知乎 Cookie (过期需手动替换)</label>
                    <textarea id="conf-cookie" class="form-control" rows="5"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">x-zse-96 签名鉴权</label>
                    <input type="text" id="conf-zse96" class="form-control">
                </div>
            </div>
        </div>

    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>

</html>
